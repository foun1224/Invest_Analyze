name: chipflow-daily

on:
  schedule:
    - cron: "30 9 * * 1-5"  # UTC 09:30 = 台北 17:30 盤後
  workflow_dispatch:
    inputs:
      date:
        description: "分析日期 YYYY-MM-DD（留空=今天）"
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Taipei
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve date
        id: d
        run: |
          DATE="${{ github.event.inputs.date }}"
          [ -z "$DATE" ] && DATE="$(date +%F)"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Run daily pipeline
        run: python -m chipflow.cli run-daily --date "${{ steps.d.outputs.date }}"

      - name: Copy latest panel to index.html
        run: |
          DATE="${{ steps.d.outputs.date }}"
          [ -f "out/panel_${DATE}.html" ] && cp "out/panel_${DATE}.html" out/index.html

      - name: Build reports listing page
        run: python scripts/build_site.py "${{ steps.d.outputs.date }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: chipflow-out-${{ steps.d.outputs.date }}
          path: out/
          retention-days: 90

  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
